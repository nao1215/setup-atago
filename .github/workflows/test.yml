name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Static checks — these always run.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run ShellCheck
        # -x lets ShellCheck follow the sourced install.sh from version_test.sh.
        run: shellcheck -x scripts/install.sh scripts/version_test.sh

      - name: Run actionlint
        uses: raven-actions/actionlint@v2

      - name: Test version normalization
        run: bash scripts/version_test.sh

  # Integration test that actually installs atago on every supported platform.
  #
  # atago has no published release yet, so this would fail on the download step.
  # It is gated behind workflow_dispatch to avoid blocking PRs. Once the first
  # release (v0.1.0) exists, remove the `if` below to run it on push/PR.
  # TODO(v0.1.0): enable on push/pull_request after the first atago release.
  install:
    name: Install (${{ matrix.os }})
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-13, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup atago
        id: setup
        uses: ./
        with:
          version: latest

      - name: Print resolved outputs
        shell: bash
        run: |
          echo "version=${{ steps.setup.outputs.version }}"
          echo "bin-path=${{ steps.setup.outputs.bin-path }}"
          echo "install-dir=${{ steps.setup.outputs.install-dir }}"

      - name: Verify atago on PATH (bash)
        shell: bash
        run: |
          command -v atago
          atago version || atago --version || atago --help

      - name: Verify atago on PATH (PowerShell)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-Command atago
          atago --version
